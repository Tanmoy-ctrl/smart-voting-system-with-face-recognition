<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Results - Smart Voting</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>
<body>
  <div class="container">
    <h2>Live Results</h2>
    <div id="results"></div>
    <script>
      async function load() {
        const r = await fetch('/api/results');
        const json = await r.json();
        const el = document.getElementById('results');
        el.innerHTML = json.map(c=>`<div><b>${c.name}</b> (${c.party||'--'}): ${c.votes} votes</div>`).join('');
      }
      load();
    </script>
  </div>
</body>
</html>
